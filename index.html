<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllScale Lab</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="AllScale Lab - Stablecoin experiments for positive externalities">
</head>
<body>
    <div id="scanline"></div>
    <div id="terminal">
        <div id="terminal-header">
            <div class="terminal-buttons">
                <span class="btn-close"></span>
                <span class="btn-minimize"></span>
                <span class="btn-maximize"></span>
            </div>
            <div class="terminal-title">lab@allscale: ~/experiments</div>
        </div>
        <div id="terminal-body">
            <div id="output"></div>
            <div id="input-line">
                <span class="prompt">visitor@lab:~$&nbsp;</span>
                <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
